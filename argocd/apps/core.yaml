apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-platform-core
  namespace: argocd
spec:
  project: data-platform
  source:
    repoURL: https://github.com/LOCAL/REPLACE-ME.git
    targetRevision: HEAD
    path: k8s/helm/data-platform-core
  destination:
    server: https://kubernetes.default.svc
    namespace: data-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true