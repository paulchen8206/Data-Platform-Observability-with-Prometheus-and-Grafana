global:
  scrape_interval: 10s
  evaluation_interval: 10s
rule_files:
- /etc/prometheus/alert_rules.yml
alerting:
  alertmanagers:
  - static_configs:
    - targets: ["alertmanager:9093"]
scrape_configs:
- job_name: prometheus
  static_configs:
  - targets: ["prometheus:9090"]
- job_name: kafka_exporter
  static_configs:
  - targets: ["kafka-exporter:9308"]
- job_name: cadvisor
  static_configs:
  - targets: ["cadvisor:8080"]
- job_name: node_exporter
  static_configs:
  - targets: ["node-exporter:9100"]
- job_name: alloy
  static_configs:
  - targets: ["alloy:12345"]