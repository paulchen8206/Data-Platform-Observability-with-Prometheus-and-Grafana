groups:
- name: data-platform-alerts
  rules:
  - alert: KafkaExporterDown
    expr: up{job="kafka_exporter"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Kafka exporter is down
      description: Kafka exporter target has been unreachable for more than 1 minute.
  - alert: NodeExporterDown
    expr: up{job="node_exporter"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Node exporter is down
      description: Node exporter target has been unreachable for more than 1 minute.
  - alert: HighContainerCpuUsage
    expr: sum(rate(container_cpu_usage_seconds_total{image!=""}[2m])) > 0.80
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: High total container CPU usage
      description: Total container CPU usage has been above 80 percent for more than 2 minutes.
  - alert: HighContainerMemoryUsage
    expr: sum(container_memory_usage_bytes{image!=""}) > 6e9
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: High total container memory usage
      description: Total container memory usage has been above 6 GB for more than 2 minutes.