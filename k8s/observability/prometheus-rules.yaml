apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: data-platform-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: data-platform-alerts
    rules:
    - alert: KafkaExporterDown
      expr: up{job="kafka_exporter"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: Kafka exporter is down
        description: Kafka exporter target has been unreachable for more than 1 minute.
    - alert: NodeExporterDown
      expr: up{job="node_exporter"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: Node exporter is down
        description: Node exporter target has been unreachable for more than 1 minute.
    - alert: HighContainerCpuUsage
      expr: sum(rate(container_cpu_usage_seconds_total{image!=""}[2m])) > 0.80
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: High total container CPU usage
        description: Total container CPU usage has been above 80 percent for more than 2 minutes.
    - alert: HighContainerMemoryUsage
      expr: sum(container_memory_usage_bytes{image!=""}) > 6e9
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: High total container memory usage
        description: Total container memory usage has been above 6 GB for more than 2 minutes.
    - alert: KafkaTopicNoEvents2m
      expr: sum(increase(kafka_topic_partition_current_offset{topic="platform-events"}[2m])) <= 0
      labels:
        severity: warning
        topic: platform-events
      annotations:
        summary: No Kafka events on platform-events for 2 minutes
        description: Topic platform-events has no offset increase in the last 2 minutes, indicating no events were produced.
    - alert: KafkaConsumerLagHigh
      expr: max(kafka_consumergroup_lag{topic="platform-events"}) > 100
      for: 2m
      labels:
        severity: warning
        topic: platform-events
      annotations:
        summary: Kafka consumer lag is above 100 on platform-events
        description: A consumer group on topic platform-events has lag {{ $value }} (threshold 100).