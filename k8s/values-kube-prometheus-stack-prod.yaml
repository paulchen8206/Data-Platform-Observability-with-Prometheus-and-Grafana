# Production-like defaults for kube-prometheus-stack.
# Chart: prometheus-community/kube-prometheus-stack

grafana:
  enabled: true
  replicas: 2
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      folderAnnotation: grafana_folder
      searchNamespace: monitoring
  additionalDataSources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki.monitoring.svc.cluster.local:3100
    editable: false
  - name: Alertmanager
    uid: alertmanager
    type: alertmanager
    access: proxy
    url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
    editable: false
    jsonData:
      implementation: prometheus
  persistence:
    enabled: true
    type: pvc
    accessModes:
    - ReadWriteOnce
    size: 10Gi
  initChownData:
    enabled: false
  podSecurityContext:
    fsGroup: 472
    fsGroupChangePolicy: OnRootMismatch
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # Create secret before install:
  # kubectl -n monitoring create secret generic grafana-admin \
  #   --from-literal=admin-user=<user> --from-literal=admin-password=<password>
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
    - grafana.local
    path: /
    pathType: Prefix
  rbac:
    create: true
  serviceAccount:
    create: true
prometheus:
  prometheusSpec:
    replicas: 2
    retention: 15d
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
alertmanager:
  alertmanagerSpec:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
# Disable kube-system control plane scrape services for local Minikube.
# This avoids creating service resources in kube-system from this app.
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
coreDns:
  enabled: false
kubeDns:
  enabled: false