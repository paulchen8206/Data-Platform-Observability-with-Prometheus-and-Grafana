# Production-like defaults for kube-prometheus-stack.
# Chart: prometheus-community/kube-prometheus-stack

grafana:
  enabled: true
  replicas: 1
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  image:
    tag: 11.5.2
  extraInitContainers:
  - name: grafana-db-data-keys-repair
    image: keinos/sqlite3:3.46.1
    imagePullPolicy: IfNotPresent
    command:
    - /bin/sh
    - -ec
    - |
      DB=/var/lib/grafana/grafana.db
      if [ ! -f "$DB" ]; then
        exit 0
      fi

      TABLE_EXISTS=$(sqlite3 "$DB" "SELECT COUNT(*) FROM sqlite_master WHERE type='table' AND name='data_keys';")
      if [ "$TABLE_EXISTS" != "1" ]; then
        exit 0
      fi

      HAS_DEFAULT=$(sqlite3 "$DB" "SELECT CASE WHEN dflt_value IS NULL THEN 0 ELSE 1 END FROM pragma_table_info('data_keys') WHERE name='id';")
      if [ -z "$HAS_DEFAULT" ] || [ "$HAS_DEFAULT" = "1" ]; then
        exit 0
      fi

      sqlite3 "$DB" "BEGIN;
      ALTER TABLE data_keys RENAME TO data_keys_old;
      CREATE TABLE data_keys (
        id TEXT PRIMARY KEY NOT NULL DEFAULT (lower(hex(randomblob(16)))),
        active INTEGER NOT NULL,
        scope TEXT NOT NULL,
        provider TEXT NOT NULL,
        encrypted_data BLOB NOT NULL,
        created DATETIME NOT NULL,
        updated DATETIME NOT NULL,
        label TEXT NOT NULL DEFAULT '',
        name TEXT NOT NULL DEFAULT ''
      );
      INSERT INTO data_keys(id,active,scope,provider,encrypted_data,created,updated,label,name)
      SELECT id,active,scope,provider,encrypted_data,created,updated,label,name FROM data_keys_old;
      DROP TABLE data_keys_old;
      COMMIT;"

      chown 472:472 "$DB"
      chmod 640 "$DB"
    volumeMounts:
    - name: storage
      mountPath: /var/lib/grafana
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      folderAnnotation: grafana_folder
      searchNamespace: monitoring
    datasources:
      enabled: true
      defaultDatasourceEnabled: true
      isDefaultDatasource: true
      alertmanager:
        enabled: true
        name: Alertmanager
        uid: alertmanager
        implementation: prometheus
  additionalDataSources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki.monitoring.svc.cluster.local:3100
    editable: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: "1"
  persistence:
    enabled: true
    type: pvc
    accessModes:
    - ReadWriteOnce
    size: 10Gi
  initChownData:
    enabled: false
  podSecurityContext:
    fsGroup: 472
    fsGroupChangePolicy: OnRootMismatch
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # Create secret before install:
  # kubectl -n monitoring create secret generic grafana-admin \
  #   --from-literal=admin-user=<user> --from-literal=admin-password=<password>
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      argocd.argoproj.io/ignore-healthcheck: "true"
    hosts:
    - grafana.local
    path: /
    pathType: Prefix
  rbac:
    create: true
  serviceAccount:
    create: true
prometheus:
  prometheusSpec:
    replicas: 2
    retention: 15d
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
alertmanager:
  alertmanagerSpec:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
# Disable kube-system control plane scrape services for local Minikube.
# This avoids creating service resources in kube-system from this app.
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
coreDns:
  enabled: false
kubeDns:
  enabled: false