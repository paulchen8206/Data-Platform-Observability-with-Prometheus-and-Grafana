# Production-like defaults for kube-prometheus-stack.
# Chart: prometheus-community/kube-prometheus-stack

grafana:
  enabled: true
  replicas: 2
  persistence:
    enabled: true
    type: pvc
    accessModes:
    - ReadWriteOnce
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # Create secret before install:
  # kubectl -n monitoring create secret generic grafana-admin \
  #   --from-literal=admin-user=<user> --from-literal=admin-password=<password>
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
    - grafana.local
    path: /
    pathType: Prefix
  rbac:
    create: true
  serviceAccount:
    create: true
prometheus:
  prometheusSpec:
    replicas: 2
    retention: 15d
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
alertmanager:
  alertmanagerSpec:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
# Disable kube-system control plane scrape services for local Minikube.
# This avoids creating service resources in kube-system from this app.
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
coreDns:
  enabled: false
kubeDns:
  enabled: false